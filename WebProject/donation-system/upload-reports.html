<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Reports - CareHaven</title>

<link rel="stylesheet" href="upload-reports.css">
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Poppins:wght@300;400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body>
<nav class="navbar">
  <button class="back-button" onclick="window.location.href='ngo-dashboard.html'">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="back-icon">
      <circle cx="12" cy="12" r="10" fill="none" stroke="white" stroke-width="3"/>
      <path d="M14 8l-4 4 4 4" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="logo">CareHaven</div>
  <ul>
    <li><a href="ngo-dashboard.html">Dashboard</a></li>
    <li><a href="create-campaign.html">Create Campaign</a></li>
    <li><a class="active">Upload Reports</a></li>
    <li><a href="#" onclick="logout(); return false;">Logout</a></li>
  </ul>
</nav>

<div id="approvalBanner" hidden></div>

<section class="container">
    <h1>Upload Impact Report</h1>
    <p>Select the campaign and add your PDF/image reports.</p>

    <form id="reportForm">
        <label for="campaignSelect">Select Campaign</label>
        <select id="campaignSelect" name="campaignId" required>
            <option value="">Loading campaigns...</option>
        </select>

        <label for="reportTitle">Report Title</label>
        <input type="text" id="reportTitle" name="title" required maxlength="160" placeholder="e.g. January impact report">

        <label for="reportDescription">Description (optional)</label>
        <textarea id="reportDescription" name="description" maxlength="1000" placeholder="Summarize what this report covers"></textarea>

        <label for="reportFile">Upload Report File</label>
        <input type="file" id="reportFile" accept=".pdf,image/*" required>

        <button type="submit" class="submit-btn">Upload Report</button>
        <div id="message" class="message" role="alert" aria-live="polite"></div>
    </form>
</section>

<script src="js/auth.js"></script>
<script src="upload-reports.js"></script>
</body>
</html>
